<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FPO Flyers — Slideshow</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; width: 100%; overflow: hidden; background: #fff; }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
    .controls {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 1.5rem;
      pointer-events: none;
      font-family: Georgia, "Times New Roman", serif;
    }
    .controls > * {
      pointer-events: auto;
    }
    .counter {
      font-size: 20px;
      color: #444;
      letter-spacing: 0.02em;
      user-select: none;
    }
    .nav-buttons {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .nav-btn {
      cursor: pointer;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 22px;
      color: #333;
      background: rgba(255,255,255,0.85);
      border: 1.5px solid #bbb;
      border-radius: 4px;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease;
      user-select: none;
    }
    .nav-btn:hover {
      background: #333;
      border-color: #333;
      color: #fff;
    }
  </style>
</head>
<body>
  <iframe id="viewer"></iframe>
  <div class="controls" id="controls" style="display:none">
    <span class="counter" id="counter"></span>
    <div class="nav-buttons">
      <button class="nav-btn" id="prevBtn" title="Previous">&lsaquo;</button>
      <button class="nav-btn" id="pauseBtn" title="Pause">&Vert;</button>
      <button class="nav-btn" id="nextBtn" title="Next">&rsaquo;</button>
    </div>
  </div>
  <script>
    var colorNames = ['gold', 'olive', 'tan', 'sage', 'teal', 'plum', 'rose'];
    var INTERVAL = 15000;
    var files = [];
    var current = 0;
    var timer = null;
    var playing = true;
    var viewer = document.getElementById('viewer');
    var counter = document.getElementById('counter');
    var controls = document.getElementById('controls');
    var pauseBtn = document.getElementById('pauseBtn');

    function show(index) {
      if (files.length === 0) return;
      current = ((index % files.length) + files.length) % files.length;
      var base = files[current].replace('.pdf', '');
      var color = colorNames[current % colorNames.length];
      viewer.src = base + '.html?bg=' + color;
      if (files.length > 1) {
        counter.textContent = (current + 1) + '\u2009/\u2009' + files.length;
      }
    }

    function start() {
      if (timer) return;
      timer = setInterval(function() { show(current + 1); }, INTERVAL);
      playing = true;
      pauseBtn.innerHTML = '&Vert;';
      pauseBtn.title = 'Pause';
    }

    function stop() {
      clearInterval(timer);
      timer = null;
      playing = false;
      pauseBtn.innerHTML = '&#9655;';
      pauseBtn.title = 'Play';
    }

    document.getElementById('prevBtn').addEventListener('click', function() {
      stop();
      show(current - 1);
    });

    document.getElementById('nextBtn').addEventListener('click', function() {
      stop();
      show(current + 1);
    });

    pauseBtn.addEventListener('click', function() {
      if (playing) { stop(); } else { start(); }
    });

    fetch('manifest.json')
      .then(function(r) { return r.json(); })
      .then(function(f) {
        files = f;
        if (files.length === 0) {
          document.body.innerHTML = '<p style="padding:2rem;font-family:sans-serif">No flyers available.</p>';
          return;
        }
        if (files.length > 1) {
          controls.style.display = '';
        }
        show(0);
        start();
      });
  </script>
</body>
</html>
