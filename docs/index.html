<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FPO Flyers — Princeton ORFE</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>FPO Flyers</h1>
    <p>Final Public Oral Examination announcements — Princeton ORFE</p>
  </header>
  <main>
    <div id="flyers">
      <p class="loading">Loading flyers&hellip;</p>
    </div>
  </main>
  <footer>
    <p>Automatically generated from the
      <a href="https://orfe.princeton.edu/feeds/events/ical.ics?tid=491">ORFE ICS feed</a>.
    </p>
  </footer>
  <script>
    fetch('manifest.json')
      .then(r => r.json())
      .then(files => {
        const container = document.getElementById('flyers');
        container.innerHTML = '';
        if (files.length === 0) {
          container.innerHTML = '<p>No flyers currently available.</p>';
          return;
        }
        var bgColors = [
          {name: 'gold',  rgb: 'rgb(201,140,32)'},
          {name: 'olive', rgb: 'rgb(197,184,98)'},
          {name: 'tan',   rgb: 'rgb(227,208,162)'},
          {name: 'sage',  rgb: 'rgb(142,171,136)'},
          {name: 'teal',  rgb: 'rgb(127,155,163)'},
          {name: 'plum',  rgb: 'rgb(141,120,153)'},
          {name: 'rose',  rgb: 'rgb(182,134,131)'}
        ];
        const ul = document.createElement('ul');
        files.forEach(f => {
          const li = document.createElement('li');
          const base = f.replace('.pdf', '');
          const div = document.createElement('div');
          div.className = 'flyer-links';

          const nameSpan = document.createElement('span');
          nameSpan.className = 'flyer-name';
          nameSpan.textContent = base.replace(/_/g, ' ') + ' \u2014';
          div.appendChild(nameSpan);

          const viewLink = document.createElement('a');
          viewLink.href = base + '.html';
          viewLink.textContent = 'View';
          div.appendChild(viewLink);

          const dots = document.createElement('span');
          dots.className = 'color-dots';
          bgColors.forEach(c => {
            const dot = document.createElement('a');
            dot.href = base + '.html?bg=' + c.name;
            dot.style.background = c.rgb;
            dot.title = c.name.charAt(0).toUpperCase() + c.name.slice(1);
            dots.appendChild(dot);
          });
          div.appendChild(dots);

          const sep = document.createElement('span');
          sep.className = 'sep';
          sep.textContent = '|';
          div.appendChild(sep);

          const pdfLink = document.createElement('a');
          pdfLink.href = f;
          pdfLink.textContent = 'PDF';
          div.appendChild(pdfLink);

          li.appendChild(div);
          ul.appendChild(li);
        });
        container.appendChild(ul);
      })
      .catch(() => {
        document.getElementById('flyers').innerHTML =
          '<p>No flyers currently available.</p>';
      });
  </script>
</body>
</html>
